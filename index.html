<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kjeldgaard · Ad Review</title>
<style>
:root{
  --bg:#0f1115; --panel:#171a21; --panel2:#1e222b; --line:#2a2f3a;
  --tx:#e8eaed; --tx2:#a4abb8; --tx3:#6e7684;
  --kold:#378ADD; --koldbg:#13243a; --varm:#EF9F27; --varmbg:#2e2410; --hot:#D85A30; --hotbg:#2e1a12;
  --accent:#c9a24a;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--tx);height:100vh;overflow:hidden}
.app{display:grid;grid-template-columns:300px 1fr;height:100vh}
/* sidebar */
.side{background:var(--panel);border-right:1px solid var(--line);overflow-y:auto;padding:14px 10px}
.side h1{font-size:15px;margin:4px 6px 2px;font-weight:600}
.side .sub{font-size:12px;color:var(--tx3);margin:0 6px 12px}
.tier{font-size:12px;font-weight:600;letter-spacing:.02em;margin:16px 6px 6px;display:flex;align-items:center;gap:7px}
.tier .dot{width:9px;height:9px;border-radius:50%}
.tier .cnt{color:var(--tx3);font-weight:400}
.row{display:flex;gap:9px;align-items:center;padding:6px;border-radius:8px;cursor:pointer;margin-bottom:2px}
.row:hover{background:var(--panel2)}
.row.on{background:var(--panel2);outline:1px solid var(--accent)}
.row img{width:38px;height:38px;object-fit:cover;border-radius:5px;background:#000;flex:none}
.row .nm{font-size:13px;text-transform:capitalize;line-height:1.2}
.row .st{font-size:11px;color:var(--tx3)}
/* main */
.main{display:flex;flex-direction:column;height:100vh;overflow:hidden}
.bar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--line)}
.bar .name{font-size:17px;font-weight:600;text-transform:capitalize}
.chip{font-size:12px;padding:3px 10px;border-radius:6px;font-weight:600}
.spacer{flex:1}
.toggle,.nav button,.exp{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:6px 11px;font-size:13px;cursor:pointer}
.toggle.on{background:var(--accent);color:#1a1500;border-color:var(--accent)}
.nav{display:flex;gap:6px}
.body{flex:1;display:grid;grid-template-columns:1fr 360px;gap:0;overflow:hidden}
.stage{display:flex;align-items:center;justify-content:center;padding:18px;overflow:auto;background:#0a0c10}
.stage img{max-width:100%;max-height:100%;object-fit:contain;border-radius:8px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
.panel{border-left:1px solid var(--line);background:var(--panel);padding:18px;overflow-y:auto;display:flex;flex-direction:column}
.lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin:14px 0 5px}
.lab:first-child{margin-top:0}
.val{font-size:14px;line-height:1.6;color:var(--tx)}
.val.muted{color:var(--tx2)}
textarea{width:100%;flex:1;min-height:120px;margin-top:6px;background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:8px;padding:11px;font-size:14px;line-height:1.5;resize:none;font-family:inherit}
textarea:focus{outline:none;border-color:var(--accent)}
.editta{flex:none;min-height:70px;height:70px}
.lab-note{text-transform:none;letter-spacing:0;color:var(--tx3);font-weight:400}
.presets{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:7px}
.preset{font-size:12px;padding:4px 9px;border-radius:6px;background:var(--panel2);color:var(--tx2);border:1px solid var(--line);cursor:pointer}
.preset:hover{border-color:var(--accent);color:var(--tx)}
.sendbtn{margin-top:8px;width:100%;background:var(--accent);color:#1a1500;border:none;border-radius:8px;padding:9px;font-size:13px;font-weight:600;cursor:pointer}
.sendbtn:hover{filter:brightness(1.06)}
.sendbtn:active{transform:scale(.99)}
.cmtform{display:flex;flex-direction:column;gap:7px;margin-top:2px}
.cinput{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:13px;font-family:inherit}
.cinput:focus{outline:none;border-color:var(--accent)}
.cta{background:var(--panel2);color:var(--tx);border:1px solid var(--line);border-radius:7px;padding:8px;font-size:14px;min-height:54px;resize:none;font-family:inherit;flex:1}
.cta:focus{outline:none;border-color:var(--accent)}
.cmtlist{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.cmt{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px 11px}
.cmt .meta{font-size:11px;color:var(--tx3);margin-bottom:3px;display:flex;gap:7px;align-items:center}
.cmt .who{color:var(--tx);font-weight:600}
.cmt .ctag{background:#13243a;color:#7fb6ef;padding:1px 6px;border-radius:4px;font-size:10px}
.cmt .body{font-size:14px;line-height:1.5;color:var(--tx);white-space:pre-wrap}
.cmuted{font-size:13px;color:var(--tx3)}
.savez{font-size:11px;color:var(--tx3);margin-top:7px;display:flex;justify-content:space-between;align-items:center}
.hint{font-size:11px;color:var(--tx3);margin-top:10px;line-height:1.5}
kbd{background:var(--panel2);border:1px solid var(--line);border-radius:4px;padding:1px 5px;font-size:11px}
</style>
</head>
<body>
<div class="app">
  <aside class="side">
    <h1>Kjeldgaard · Ad Review</h1>
    <p class="sub">19 ads · awareness + preview + feedback</p>
    <div id="list"></div>
  </aside>
  <main class="main">
    <div class="bar">
      <span class="name" id="mName">—</span>
      <span class="chip" id="mChip"></span>
      <span class="spacer"></span>
      <button class="toggle on" id="t11">1:1</button>
      <button class="toggle" id="t916">9:16</button>
      <div class="nav">
        <button id="prev">↑ Forrige</button>
        <button id="next">Næste ↓</button>
      </div>
      <button class="exp" id="export">Eksportér feedback</button>
    </div>
    <div class="body">
      <div class="stage"><img id="mImg" alt=""></div>
      <div class="panel">
        <div class="lab">Awareness-stadie</div><div class="val" id="pStage"></div>
        <div class="lab">Publikum</div><div class="val" id="pAud"></div>
        <div class="lab">Hvorfor (Schwartz)</div><div class="val muted" id="pWhy"></div>
        <div class="lab">Tekst i ad'en</div><div class="val muted" id="pTxt"></div>

        <div class="lab">✏️ Rediger billede <span class="lab-note">(sendes til Claude → ny version pushes)</span></div>
        <div class="presets" id="presets"></div>
        <textarea id="edit" class="editta" placeholder='Beskriv ændringen… fx "Skift overskrift til: Glattere hud på 28 dage" eller "Indsæt Zurko-disclaimer"'></textarea>
        <button class="sendbtn" id="sendEdit"><i></i>Send redigering til Claude</button>
        <div class="savez"><span id="editStatus"></span></div>

        <div class="lab">💬 Team-kommentarer <span class="lab-note">(delt — alle ser dem)</span></div>
        <div class="cmtform">
          <input id="cname" class="cinput" placeholder="Dit navn (påkrævet)" autocomplete="name">
          <div style="display:flex;gap:7px">
            <select id="ctag" class="cinput" style="flex:none;width:108px"><option>Note</option><option>Husk</option><option>Idé</option><option>Ret</option><option>Ros</option><option>Generelt</option></select>
            <textarea id="cbody" class="cta" placeholder="Skriv en kommentar…  (⌘+Enter sender)"></textarea>
          </div>
          <button class="sendbtn" id="addCmt">Tilføj kommentar</button>
          <div class="savez"><span id="cstatus"></span><span id="idx"></span></div>
        </div>
        <div id="cmtlist" class="cmtlist"></div>
        <div class="hint"><kbd>↑</kbd>/<kbd>↓</kbd> skift ad · kommentarer er delt med hele teamet (gemt i skyen)</div>
      </div>
    </div>
  </main>
</div>
<script>
const TIERS={kold:{lab:'KOLD · nye kunder',dot:'#378ADD',bg:'#13243a',tx:'#7fb6ef'},
 varm:{lab:'VARM · kender mærket',dot:'#EF9F27',bg:'#2e2410',tx:'#f0bf6e'},
 hot:{lab:'HOT · retargeting / luk',dot:'#D85A30',bg:'#2e1a12',tx:'#e8916a'}};
const ADS=[
 {k:'birthe',t:'kold',s:'Problem → Solution',aud:'Kold · nye kunder',w:"Relaterbar identitets-hook ('Selv som bedstemor på 65') — fanger nye der ikke kender mærket, leverer så bevis + CTA.",txt:"SELV SOM BEDSTEMOR PÅ 65 ÆNDREDE DEN MIN HUD · 27% færre rynker på 28 dage · PRØV RISIKOFRIT"},
 {k:'mette',t:'kold',s:'Solution',aud:'Kold · nye kunder',w:"Ren begær-overskrift — taler til ønsket, ikke produktet. Aspirations-indgang for nye.",txt:"GIV DIN HUD DEN TILBAGE, DEN ENGANG VAR. · Gendanner din hudbarriere"},
 {k:'gentle',t:'kold',s:'Solution (+Problem)',aud:'Kold–varm · sensitiv-segment',w:"Mekanisme + indvendingshåndtering — rammer dem hvis problem er 'retinol er for stærkt for mig'.",txt:"RETINOL — I SIN MEST SKÅNSOMME FORM · Skånsom nok til sensitiv hud · Uden parfume · uden olie"},
 {k:'sturm-hero',t:'kold',s:'Solution → Product',aud:'Kold–varm',w:"Leder med mekanismen (indkapslet retinol, langsom frigivelse) — Schwartz' svar på et udslidt marked.",txt:"INDKAPSLET RETINOL — FRIGIVES LANGSOMT OG SKÅNSOMT · Udviklet af dermatologer"},
 {k:'R4',t:'kold',s:'Solution → Product',aud:'Kold–varm',w:"'Ingen nåle. Ingen klinik.' = us-vs-them mod botox/klinik; rammer dem der sammenligner løsninger.",txt:"27% FÆRRE RYNKER · Ingen nåle. Ingen klinik. Bare din daglige serum. · pengene-tilbage-garanti"},
 {k:'R5',t:'kold',s:'Solution → Product',aud:'Kold–varm + retarget',w:"Stat + fart ('81% allerede efter 14 dage') — bevis på at det ønskede resultat er hurtigt opnåeligt.",txt:"81% oplevede synlig forbedring allerede efter 14 dage · n=21, Zurko EU"},
 {k:'miami',t:'varm',s:'Solution → Most',aud:'Fuld tragt (all-rounder)',w:"Løsning + benefits + CTA + risikofri-garanti. Sjælden all-rounder der spænder hele tragten.",txt:"Styrk din hudbarriere · Genopbygget hud — synligt på 28 dage · PRØV RISIKOFRIT · 60 dages garanti"},
 {k:'pro-woman',t:'varm',s:'Solution → Product',aud:'Fuld tragt',w:"Begær + mekanisme + trust + CTA i ét. Mid-funnel arbejdshest.",txt:"Giv din hud styrken tilbage · Indkapslet retinol — synligt glattere hud på 28 dage · PRØV RISIKOFRIT"},
 {k:'R1',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Klinisk dokumentation (100/90/95%, n=21) — Schwartz' 'ny proof/dokumentation'.",txt:"100% forbedring · 90% mere glødende · 95% mere fugtet (efter 28 dage) · n=21, Zurko EU"},
 {k:'R2',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Verificeret kunde + portræt — proof + let sammenligning ('uden brug af andre cremer').",txt:"“Min hud føles blød og glat uden brug af andre cremer. Et fantastisk produkt.” – Kathrine E."},
 {k:'R3',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Levende resultat-citat ('som en barnenumse') — dramatiseret social proof.",txt:"“MIN HUD FØLES SOM EN BARNENUMSE.” – Anonym kunde, 68 år"},
 {k:'caldera-hero',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Ægte kunde-citat (Lizzi) om resultatet — bevis til en der overvejer.",txt:"“RYNKERNE RETTER SIG NÆRMEST BARE UD.” – LIZZI, ÆGTE KUNDE"},
 {k:'celeb',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Testimonial + portræt, poleret — ren social proof.",txt:"“Mere fugt, en dejlig GLØD — og ikke så mange RYNKER.” – ÆGTE KUNDE"},
 {k:'testimonial',t:'varm',s:'Product',aud:'Varm · retargeting',w:"★★★★★ superlativ — sidste skub af bevis til en der er tæt på.",txt:"“DEN BEDSTE SERUM JEG NOGENSINDE HAR PRØVET.” – BIRGITTE F."},
 {k:'sturm-stats',t:'varm',s:'Product',aud:'Varm · retargeting',w:"Klinisk bevis i Sturm-stil (100/95/90%) — proof.",txt:"100% forbedring · 95% mere fugtet · 90% blødere hud · 21 deltagere, 28 dage"},
 {k:'aesop',t:'hot',s:'Product → Most',aud:'Varm–hot · retargeting',w:"'Gør som vores kunder' + 120 Trustpilot + 'mærk selv forskellen' — tilhør + luk.",txt:"Gør som vores kunder, og mærk selv forskellen. Din hud vil takke dig. · 120 anmeldelser"},
 {k:'method-test',t:'hot',s:'Product → Most',aud:'Hot · retargeting / BOF',w:"Claim + mekanisme + SPAR 15% + garanti — rabatten er lukkeværktøjet for nær-købere.",txt:"27% FÆRRE RYNKER PÅ 28 DAGE · Indkapslet retinol · SPAR 15% · 60 DAGES GARANTI"},
 {k:'product-value',t:'hot',s:'Product → Most',aud:'Hot · retargeting / BOF',w:"Værdi-reframe ('3 produkter i ét') + SPAR 15% + garanti — til værdi-drevne lukkere.",txt:"ÉN SERUM. ØJENCREME, SERUM OG ANSIGTSCREME I ÉT. · SPAR 15% · 60 DAGES GARANTI"},
 {k:'bente',t:'hot',s:'Product → Most',aud:'Hot · retargeting / BOF',w:"Testimonial + 'ægte Trustpilot' + 60 dages garanti — bevis + risikofjerner = luk.",txt:"“RYNKERNE RETTER SIG NÆRMEST BARE UD” – ægte Trustpilot-anmeldelse · 60 DAGES GARANTI"}
];
let cur=0, fmt='1x1';
const $=id=>document.getElementById(id);
function buildList(){
 const L=$('list'); let html='';
 ['kold','varm','hot'].forEach(tk=>{
  const T=TIERS[tk]; const items=ADS.map((a,i)=>({a,i})).filter(x=>x.a.t===tk);
  html+=`<div class="tier" style="color:${T.tx}"><span class="dot" style="background:${T.dot}"></span>${T.lab} <span class="cnt">${items.length}</span></div>`;
  items.forEach(({a,i})=>{
   html+=`<div class="row" data-i="${i}"><img src="img/${a.k}-1x1.jpg" alt=""><div><div class="nm">${a.k.replace(/-/g,' ')}</div><div class="st">${a.s}</div></div></div>`;
  });
 });
 L.innerHTML=html;
 L.querySelectorAll('.row').forEach(r=>r.addEventListener('click',()=>select(+r.dataset.i)));
}
function fbKey(k){return 'kjfb_'+k}
function select(i){
 cur=(i+ADS.length)%ADS.length; const a=ADS[cur]; const T=TIERS[a.t];
 $('mName').textContent=a.k.replace(/-/g,' ');
 const c=$('mChip'); c.textContent=a.s; c.style.background=T.bg; c.style.color=T.tx;
 $('pStage').textContent=a.s;
 $('pAud').textContent=a.aud;
 $('pWhy').textContent=a.w;
 $('pTxt').textContent=a.txt;
 $('idx').textContent=(cur+1)+' / '+ADS.length;
 setImg();
 $('edit').value=localStorage.getItem('kjedit_'+a.k)||''; $('editStatus').textContent='';
 $('cstatus').textContent=''; loadComments(a.k);
 document.querySelectorAll('.row').forEach(r=>r.classList.toggle('on',+r.dataset.i===cur));
 const onRow=document.querySelector('.row.on'); if(onRow)onRow.scrollIntoView({block:'nearest'});
}
function setImg(){
 const a=ADS[cur];
 $('mImg').src=`img/${a.k}-${fmt}.jpg`;
 $('t11').classList.toggle('on',fmt==='1x1');
 $('t916').classList.toggle('on',fmt==='9x16');
}
const SB_URL='https://aykgguqqnkfftdtgguux.supabase.co';
const SB_KEY='sb_publishable_36UAtTVpXX5vu4zes_q1vw_lB8u0Nrz';
const sbHeaders={'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json'};
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function fmtTime(t){try{return new Date(t).toLocaleString('da-DK',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});}catch(e){return '';}}
async function loadComments(adKey){
 const box=$('cmtlist'); box.innerHTML='<div class="cmuted">Henter…</div>';
 try{
  const r=await fetch(SB_URL+'/rest/v1/comments?select=*&ad_key=eq.'+encodeURIComponent(adKey)+'&order=created_at.desc',{headers:sbHeaders});
  const rows=await r.json();
  if(!Array.isArray(rows)){box.innerHTML='<div class="cmuted">Kunne ikke hente.</div>';return;}
  if(adKey!==ADS[cur].k)return;
  if(!rows.length){box.innerHTML='<div class="cmuted">Ingen kommentarer endnu — vær den første.</div>';return;}
  box.innerHTML=rows.map(c=>'<div class="cmt"><div class="meta"><span class="who">'+esc(c.name)+'</span>'+(c.tag?'<span class="ctag">'+esc(c.tag)+'</span>':'')+'<span>'+fmtTime(c.created_at)+'</span></div><div class="body">'+esc(c.body)+'</div></div>').join('');
 }catch(e){box.innerHTML='<div class="cmuted">Ingen forbindelse.</div>';}
}
async function addComment(){
 const a=ADS[cur]; const name=$('cname').value.trim(); const body=$('cbody').value.trim(); const tag=$('ctag').value;
 if(!name){$('cstatus').textContent='Skriv dit navn først.';$('cname').focus();return;}
 if(!body){$('cstatus').textContent='Skriv en kommentar.';$('cbody').focus();return;}
 localStorage.setItem('kjname',name);
 $('cstatus').textContent='Sender…';
 try{
  const r=await fetch(SB_URL+'/rest/v1/comments',{method:'POST',headers:sbHeaders,body:JSON.stringify({ad_key:a.k,name:name,tag:tag,body:body})});
  if(r.ok){$('cbody').value='';$('cstatus').textContent='✓ Tilføjet';loadComments(a.k);}
  else{$('cstatus').textContent='Fejl — prøv igen.';}
 }catch(e){$('cstatus').textContent='Ingen forbindelse.';}
}
$('addCmt').onclick=addComment;
$('cbody').addEventListener('keydown',e=>{if(e.key==='Enter'&&(e.metaKey||e.ctrlKey)){e.preventDefault();addComment();}});
$('t11').onclick=()=>{fmt='1x1';setImg();};
$('t916').onclick=()=>{fmt='9x16';setImg();};
$('prev').onclick=()=>select(cur-1);
$('next').onclick=()=>select(cur+1);
document.addEventListener('keydown',e=>{
 const tg=(e.target.tagName||'').toLowerCase();
 if(tg==='input'||tg==='textarea'||tg==='select')return;
 if(e.key==='ArrowDown'){e.preventDefault();select(cur+1);}
 else if(e.key==='ArrowUp'){e.preventDefault();select(cur-1);}
});
const PRESETS=[
 ['Skift overskrift…','Skift overskrift til: '],
 ['Glattere hud på 28 dage','Skift overskrift til: Glattere hud på 28 dage'],
 ['Indsæt Zurko-disclaimer','Indsæt diskret kildeangivelse nederst: *Klinisk studie, n=21, 28 dage · Zurko, EU*'],
 ['Fjern SPAR 15%-badge','Fjern rabat-badgen (SPAR 15%)'],
 ['Fjern element…','Fjern: '],
 ['Udskift…','Udskift … med …'],
 ['Lysere isblå flaske','Gør flasken en anelse lysere og mere isblå']
];
(function(){const wrap=$('presets');PRESETS.forEach(([label,tpl])=>{const b=document.createElement('button');b.className='preset';b.type='button';b.textContent=label;b.onclick=()=>{const t=$('edit');t.value=tpl;t.focus();t.setSelectionRange(t.value.length,t.value.length);};wrap.appendChild(b);});})();
function sendEdit(){
 const a=ADS[cur]; const p=$('edit').value.trim();
 if(!p){$('editStatus').textContent='Skriv en ændring først.';return;}
 localStorage.setItem('kjedit_'+a.k,p);
 const msg='🖼️ REDIGER "'+a.k+'" ['+fmt+']: '+p;
 if(navigator.clipboard&&navigator.clipboard.writeText){
  navigator.clipboard.writeText(msg).then(()=>{$('editStatus').textContent='✓ Kopieret — indsæt i Claude-chatten (⌘V), så laver jeg ændringen og pusher den.';}).catch(()=>{$('editStatus').textContent='Kopiér manuelt: '+msg;});
 } else {$('editStatus').textContent='Kopiér manuelt: '+msg;}
}
$('sendEdit').onclick=sendEdit;
$('export').onclick=async()=>{
 const btn=$('export'); btn.textContent='Henter…';
 try{
  const r=await fetch(SB_URL+'/rest/v1/comments?select=*&order=ad_key.asc,created_at.asc',{headers:sbHeaders});
  const rows=await r.json(); const by={};
  rows.forEach(c=>{(by[c.ad_key]=by[c.ad_key]||[]).push(c);});
  let out='KJELDGAARD AD REVIEW — team-kommentarer\n\n';
  ADS.forEach(a=>{const cs=by[a.k]||[];out+='### '+a.k+'  ['+a.s+']\n';if(!cs.length){out+='(ingen)\n';}cs.forEach(c=>{out+='- ['+(c.tag||'')+'] '+c.name+': '+c.body+'\n';});out+='\n';});
  const ed=ADS.map(a=>{const v=localStorage.getItem('kjedit_'+a.k);return v?('### '+a.k+'\n'+v):null;}).filter(Boolean);
  if(ed.length){out+='\n=== REDIGERINGS-ØNSKER (lokale) ===\n\n'+ed.join('\n')+'\n';}
  const b=new Blob([out],{type:'text/plain'}); const u=URL.createObjectURL(b);
  const x=document.createElement('a'); x.href=u; x.download='kjeldgaard-kommentarer.txt'; x.click();
 }catch(e){alert('Kunne ikke hente kommentarer.');}
 btn.textContent='Eksportér feedback';
};
$('cname').value=localStorage.getItem('kjname')||'';
buildList(); select(0);
</script>
</body>
</html>
